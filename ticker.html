<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estancia Notice Board</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>

<script>
// reload whole page every 5 minutes (300000 ms)
setInterval(function() {
  location.reload();
}, 1800000);
</script>

</head>

<body>
<audio id="bgAudio" autoplay loop muted>
  <source src="https://drive.google.com/file/d/1DBgGi75tnRvhaZS7izaZHh-k0PCebKXq/view?usp=sharing" type="audio/mpeg">
</audio>
<iframe src="https://docs.google.com/presentation/d/e/2PACX-1vTHc0WY_flII6hDu21n6FimAeugp-nPCm5-4JULvAWnE4kkjarVKncd7wiB_V23EqJb1g0b-rfqbCuE/pubembed?start=true&loop=true&delayms=10000" frameborder="0" width="1224" height="1613" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
<script>
const audio = document.getElementById("bgAudio");

// Force play (muted allowed)
window.onload = () => {
  audio.play().then(() => {
    // try to unmute after slight delay
    setTimeout(() => {
      audio.muted = false;
      audio.volume = 0.3;
    }, 1000);
  }).catch(() => {
    console.log("Autoplay still blocked");
  });
};
</script>
</body>
</html>
