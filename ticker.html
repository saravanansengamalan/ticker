<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estancia Notice Board</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
<style>
#ticker {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: rgba(0, 0, 0, 0.6);
  color: red;
  font-size: 22px;
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
}

#tickerContent {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 25s linear infinite;
}

@keyframes scrollText {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
</style>
<script>
// reload whole page every 5 minutes (300000 ms)
setInterval(function() {
  location.reload();
}, 1800000);
</script>

</head>

<body>
<audio id="bgAudio" autoplay loop muted>
  <source src="https://drive.google.com/file/d/1DBgGi75tnRvhaZS7izaZHh-k0PCebKXq/view?usp=sharing" type="audio/mpeg">
</audio>
<iframe src="https://docs.google.com/presentation/d/e/2PACX-1vTHc0WY_flII6hDu21n6FimAeugp-nPCm5-4JULvAWnE4kkjarVKncd7wiB_V23EqJb1g0b-rfqbCuE/pubembed?start=true&loop=true&delayms=10000" frameborder="0" width="1224" height="1613" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
<div id="ticker">
  <div id="tickerContent">
    Loading updates...
  </div>
</div>
  <script>
const audio = document.getElementById("bgAudio");

// Force play (muted allowed)
window.onload = () => {
  audio.play().then(() => {
    // try to unmute after slight delay
    setTimeout(() => {
      audio.muted = false;
      audio.volume = 0.3;
    }, 1000);
  }).catch(() => {
    console.log("Autoplay still blocked");
  });
};
</script>
</body>
</html>
